version: "3.9"

services:
  db:
    image: postgres:16
    container_name: anti-gaming-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: anti_gaming
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Taipei
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d anti_gaming"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anti-gaming-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: Anti-Gaming Compliance API
      APP_ENV: docker
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/anti_gaming
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
